<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PokerNow GTO Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 400px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      color: #fff;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #666;
      font-size: 11px;
      margin-bottom: 16px;
    }
    .section {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .section-title {
      font-weight: bold;
      color: #4a90d9;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .toggle-label {
      color: #ccc;
    }
    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #333;
      border-radius: 22px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #2ecc71;
    }
    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(18px);
    }
    .slider-row {
      padding: 8px 0;
    }
    .slider-row label {
      display: block;
      color: #ccc;
      margin-bottom: 4px;
    }
    .slider-row input[type="range"] {
      width: 100%;
      accent-color: #4a90d9;
    }
    .slider-value {
      color: #4a90d9;
      font-weight: bold;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-box {
      background: #0f3460;
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
    }
    .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e74c3c;
    }
    .status-dot.active { background: #2ecc71; }
  </style>
</head>
<body>
  <h1>PokerNow GTO Bot</h1>
  <div class="subtitle">MCCFR Solver + Opponent Exploit</div>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Not connected</span>
  </div>

  <!-- Session Stats -->
  <div class="section">
    <div class="section-title">Session Stats</div>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-value" id="handsPlayed">0</div>
        <div class="stat-label">Hands</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="profitLoss">0</div>
        <div class="stat-label">Profit/Loss</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="heroVpip">0%</div>
        <div class="stat-label">VPIP</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="avgSolveTime">0ms</div>
        <div class="stat-label">Avg Solve</div>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div class="section">
    <div class="section-title">Settings</div>

    <div class="toggle-row">
      <span class="toggle-label">Auto-Play</span>
      <label class="toggle-switch">
        <input type="checkbox" id="autoPlay">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Show HUD</span>
      <label class="toggle-switch">
        <input type="checkbox" id="showHud" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Show Equity</span>
      <label class="toggle-switch">
        <input type="checkbox" id="showEquity" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Confirm All-in</span>
      <label class="toggle-switch">
        <input type="checkbox" id="confirmAllIn" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="slider-row">
      <label>Exploit Weight: <span class="slider-value" id="exploitWeightValue">50%</span></label>
      <input type="range" id="exploitWeight" min="0" max="100" value="50">
    </div>

    <div class="slider-row">
      <label>CFR Iterations: <span class="slider-value" id="cfrIterValue">10000</span></label>
      <input type="range" id="cfrIterations" min="1000" max="50000" step="1000" value="10000">
    </div>

    <div class="slider-row">
      <label>Action Delay: <span class="slider-value" id="delayValue">1-4s</span></label>
      <input type="range" id="actionDelay" min="500" max="8000" step="500" value="4000">
    </div>
  </div>

  <button class="btn btn-danger" id="resetStats">Reset All Opponent Data</button>

  <script src="popup.js"></script>
</body>
</html>
